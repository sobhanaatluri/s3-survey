<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 2026 — Issue &amp; Approach Exposure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: #f5f4f1;
  color: #2E2D29;
  min-height: 100vh;
}
.top-bar {
  background: #B8860B;
  color: white;
  padding: 0.75rem 1.5rem;
}
.top-bar h1 {
  font-family: 'Source Serif 4', serif;
  font-size: 15px;
  font-weight: 500;
}
.subtext {
  font-size: 13px;
  color: #888;
  text-align: center;
  margin: 1.5rem 0 1.75rem;
}
.wrap {
  max-width: 1040px;
  margin: 0 auto;
  padding: 1.75rem 1.5rem 4rem;
}
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
}
.tab-btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.03em;
  padding: 7px 14px;
  border-radius: 99px;
  border: 1px solid #d8d4c9;
  background: white;
  color: #53565A;
  cursor: pointer;
}
.tab-btn.active-issues { background: #8C1515; border-color: #8C1515; color: white; }
.tab-btn.active-approaches { background: #1a6b4a; border-color: #1a6b4a; color: white; }

.legend {
  display: none;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 1.25rem;
  font-size: 11.5px;
  color: #53565A;
}
.legend.visible { display: flex; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.panel { display: none; }
.panel.visible { display: block; }

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}
.section-label .clear-btn {
  position: absolute;
  right: 0;
}
.clear-btn {
  font-size: 11px;
  font-weight: 600;
  color: #8C1515;
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.02em;
  text-transform: none;
}
.clear-btn.knowledge-clear { color: #1a6b4a; }

.chip-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 1.75rem;
}
.chip {
  font-size: 12.5px;
  padding: 6px 13px;
  border-radius: 8px;
  border: 1px solid #e0ddd6;
  background: white;
  color: #2E2D29;
  cursor: pointer;
  transition: all 0.12s ease;
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1.3;
}
.chip:hover { border-color: #bbb; }
.chip .count {
  font-size: 10.5px;
  color: #999;
  background: #f1efe8;
  padding: 1px 6px;
  border-radius: 99px;
}
.chip.selected.issues { background: #8C1515; border-color: #8C1515; color: white; }
.chip.selected.issues .count { background: rgba(255,255,255,0.25); color: white; }
.chip.selected.approaches { background: #1a6b4a; border-color: #1a6b4a; color: white; }
.chip.selected.approaches .count { background: rgba(255,255,255,0.25); color: white; }
.chip.dim { opacity: 0.35; }

.summary-bar {
  display: none;
  background: white;
  border: 1px solid #e0ddd6;
  border-radius: 10px;
  padding: 1.1rem 1.4rem;
  margin-bottom: 1.75rem;
  gap: 2.5rem;
  flex-wrap: wrap;
}
.summary-bar.visible { display: flex; }
.stat { min-width: 90px; }
.stat-num {
  font-family: 'Source Serif 4', serif;
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
}
.stat-label {
  font-size: 10.5px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 4px;
}
.stat-breakdown {
  font-size: 12px;
  color: #53565A;
  line-height: 1.7;
}
.stat-breakdown b { color: #2E2D29; font-weight: 600; }

.results-label {
  font-size: 12.5px;
  color: #888;
  margin-bottom: 0.9rem;
}
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 0.9rem;
}
.person-card {
  background: white;
  border: 1px solid #e0ddd6;
  border-left: 4px solid #ccc;
  border-radius: 10px;
  padding: 1rem 1.1rem;
}
.person-name { font-size: 14px; font-weight: 600; color: #2E2D29; }
.person-org { font-size: 12px; color: #888; margin-top: 1px; }
.person-meta {
  font-size: 11px;
  color: #999;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.orgform-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.person-tags { font-size: 11.5px; color: #53565A; line-height: 1.6; }
.person-tags .match { color: #2E2D29; font-weight: 600; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: #999;
  font-size: 13.5px;
}
</style>
</head>

const ORG_COLORS = {
  "NGOs": "#C2185B",
  "Public Sector": "#185FA5",
  "Health & Education": "#0F6E56",
  "Large Firms": "#993C1D",
  "Entrepreneurs / Venture Caps": "#E65100"
};

let activeTab = 'issues';
let selected = { issues: new Set(), approaches: new Set() };

function fieldFor(tab){ return tab === 'issues' ? 'problems' : 'solutions'; }

function allTags(tab){
  const f = fieldFor(tab);
  const counts = {};
  PEOPLE.forEach(p => (p[f]||[]).forEach(t => counts[t] = (counts[t]||0)+1));
  return Object.entries(counts).sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]));
}

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-issues').className = 'tab-btn' + (tab==='issues' ? ' active-issues' : '');
  document.getElementById('tab-approaches').className = 'tab-btn' + (tab==='approaches' ? ' active-approaches' : '');
  document.getElementById('panel-issues').className = 'panel' + (tab==='issues' ? ' visible' : '');
  document.getElementById('panel-approaches').className = 'panel' + (tab==='approaches' ? ' visible' : '');
  render();
}

function toggleChip(tab, tag){
  if(selected[tab].has(tag)) selected[tab].delete(tag);
  else selected[tab].add(tag);
  render();
}

function clearSelection(tab){
  selected[tab].clear();
  render();
}

function matchedPeople(){
  const selIssues = [...selected.issues];
  const selApproaches = [...selected.approaches];
  if(selIssues.length === 0 && selApproaches.length === 0) return null;
  return PEOPLE.filter(p => {
    const issuesOk = selIssues.every(t => (p.problems||[]).includes(t));
    const approachesOk = selApproaches.every(t => (p.solutions||[]).includes(t));
    return issuesOk && approachesOk;
  });
}

function renderChips(tab){
  const container = document.getElementById('chips-' + tab);
  const matched = matchedPeople();
  const tags = allTags(tab);
  container.innerHTML = tags.map(([tag, count]) => {
    const isSelected = selected[tab].has(tag);
    let liveCount = count;
    if(matched){
      liveCount = matched.filter(p => (p[fieldFor(tab)]||[]).includes(tag)).length;
    }
    const dim = matched && liveCount === 0 && !isSelected ? ' dim' : '';
    const escaped = tag.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    return `<button type="button" class="chip ${tab}${isSelected ? ' selected' : ''}${dim}" data-tab="${tab}" data-tag="${escaped}">
      ${escaped} <span class="count">${liveCount}</span>
    </button>`;
  }).join('');
}

function renderSummary(matched){
  const bar = document.getElementById('summary-bar');
  if(!matched){ bar.className = 'summary-bar'; bar.innerHTML=''; return; }
  bar.className = 'summary-bar visible';

  const byOrgForm = {};
  const byRegion = {};
  matched.forEach(p => {
    if(p.orgForm) byOrgForm[p.orgForm] = (byOrgForm[p.orgForm]||0)+1;
    if(p.region) byRegion[p.region] = (byRegion[p.region]||0)+1;
  });
  const orgFormStr = Object.entries(byOrgForm).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<b>${v}</b> ${k}`).join(' · ') || '—';
  const regionStr = Object.entries(byRegion).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<b>${v}</b> ${k.split(' (')[0]}`).join(' · ') || '—';

  bar.innerHTML = `
    <div class="stat">
      <div class="stat-num">${matched.length}</div>
      <div class="stat-label">People</div>
    </div>
    <div class="stat-breakdown" style="flex:1;min-width:220px;">
      <div><b>By org form</b> — ${orgFormStr}</div>
    </div>
    <div class="stat-breakdown" style="flex:1;min-width:220px;">
      <div><b>By region</b> — ${regionStr}</div>
    </div>
  `;
}

function renderPeople(matched){

    label.textContent = '';
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Select a tag above to see who's working on it.</div>`;
    return;
  }
  label.textContent = matched.length + (matched.length === 1 ? ' person matches' : ' people match') + ' your selection';
  if(matched.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No one matches this combination — try removing a tag.</div>`;
    return;
  }
  const selIssues = [...selected.issues];
  const selApproaches = [...selected.approaches];
  grid.innerHTML = matched.map(p => {
    const otherProblems = (p.problems||[]).filter(t => !selIssues.includes(t));
    const otherSolutions = (p.solutions||[]).filter(t => !selApproaches.includes(t));
    let tagsHtml = '';
    if(selIssues.length){
      tagsHtml += `<div><span class="match">Matched issue${selIssues.length>1?'s':''}:</span> ${selIssues.filter(t=>(p.problems||[]).includes(t)).join(', ')}</div>`;
    }
    if(selApproaches.length){
      tagsHtml += `<div><span class="match">Matched approach${selApproaches.length>1?'es':''}:</span> ${selApproaches.filter(t=>(p.solutions||[]).includes(t)).join(', ')}</div>`;
    }
    const color = ORG_COLORS[p.orgForm] || '#999';
    const regionShort = (p.region||'').split(' (')[0];
    return `<div class="person-card" style="border-left-color:${color};">
      <div class="person-name">${p.name}</div>
      <div class="person-org">${p.org}</div>
      <div class="person-meta">
        <span class="orgform-dot" style="background:${color};"></span>
        <span>${p.orgForm || '—'}${regionShort ? ' · ' + regionShort : ''}</span>
      </div>
      <div class="person-tags">${tagsHtml}</div>
    </div>`;
  }).join('');
}

function renderLegend(matched){
  const legend = document.getElementById('legend');
  if(!matched){ legend.className = 'legend'; legend.innerHTML = ''; return; }
  legend.className = 'legend visible';
  legend.innerHTML = Object.entries(ORG_COLORS).map(([name,color]) =>
    `<div class="legend-item"><span class="legend-dot" style="background:${color};"></span>${name}</div>`
  ).join('');
}

function render(){
  const matched = matchedPeople();
  renderChips('issues');
  renderChips('approaches');
  renderSummary(matched);
  renderLegend(matched);
  renderPeople(matched);
}


render();

document.addEventListener('click', function(e){
  const chip = e.target.closest('.chip');
  if(chip){
    const tab = chip.getAttribute('data-tab');
    const tag = chip.getAttribute('data-tag');
    toggleChip(tab, tag);
  }
});
</script>
